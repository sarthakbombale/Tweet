{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Stable Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>
        {% block title %}
        Chai Aur Django
        {% endblock %}
    </title>
</head>

<body class="bg-dark text-light">
    <!-- Dark themed navigation bar container -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="{% url 'index' %}">Chai Aur Django</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{% url 'index' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'tweet_list' %}">Tweets</a>
                    </li>
                </ul>
                <ul class="navbar-nav mb-2 mb-lg-0 me-3">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" class="d-flex m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link text-decoration-none">Logout</button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Block -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Required Bootstrap JS Bundle for Dropdowns & Mobile Toggles -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-A3c7vy3z29KfG5pEcNqcZJRv3YyAyNx5uXPvtg8JmYxLAsY7DhjT8oVf3I9f2y8x"
        crossorigin="anonymous"></script>
</body>

</html>
